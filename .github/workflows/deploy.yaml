name: Deploy Next.js to CloudPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Execute Remote SSH Commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22 
        script: |
          cd ~/htdocs/hotelmanagement.n6solution.com/Hotelos
          git pull origin main

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          npm install
          npm run build

          # Production optimized restart:
          pm2 restart hotel-os --update-env || pm2 start npm --name "hotel-os" -- run start -- -p 3002