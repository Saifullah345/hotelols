name: Deploy Next.js to CloudPanel

on:
  push:
    branches:
      - main  # Triggers whenever you push code to your main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Execute Remote SSH Commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22 
        script: |
          # Navigate to the project directory
          cd ~/htdocs/hotelmanagement.n6solution.com/Hotelos

          # Pull latest code
          git pull origin main

          # Load NVM (Node Version Manager) environment path
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          # Install dependencies and build production assets
          npm install
          npm run build

          # Safely restart your PM2 application instance
          pm2 restart hotel-os --update-env || pm2 start npm --name "hotel-os" -- run dev -- -p 3002